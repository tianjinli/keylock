# HL: 水平居左 Horizontally Left-Aligned (Default)
# HC: 水平居中 Horizontally Centered
# HR: 水平居右 Horizontally Right-Aligned
# VT: 垂直居上 Vertically Top-Aligned (Default)
# VC: 垂直居中 Vertically Centered
# VB: 垂直居下 Vertically Bottom-Aligned

[MenuText]
FileNum=数字键锁
FileCaps=大写键锁
FileScroll=滚动键锁
FileModify=修改配置
FileStart=开机启动
FileExit=安全退出

# 数字锁定
[NumLock]
# 窗口坐标偏移
HudOffset=0,50
# 屏幕对齐方式
HudAlignment=HC|VT
# 桌面图像
HudImageOn=NumLock_On.png
HudImageOff=NumLock_Off.png
# 托盘图标
IconVisible=true
TrayIconOn=NumLock_On.png
TrayIconOff=NumLock_Off.png
# 托盘图标提示
TrayTipOn=数字键已锁🔒
TrayTipOff=数字键未锁🔓
# 音效配置
SoundMuted=true
KeySoundOn=KeyLock_On.wav
KeySoundOff=KeyLock_Off.wav
# HUD 显示时长 (<=0 Ignore)
HudDisplayDuration=1
# 自动恢复锁定状态 (LOCK|UNLOCK|NONE)
AutoRestoreState=LOCK
# 恢复数字锁定延时 (<=0 Ignore)
AutoRestoreDelay=5

# 大写锁定
[CapsLock]
# 窗口坐标偏移
HudOffset=0,50
# 屏幕对齐方式
HudAlignment=HC|VT
# 桌面图像
HudImageOn=CapsLock_On.png
HudImageOff=CapsLock_Off.png
# 托盘图标
IconVisible=true
TrayIconOn=CapsLock_On.png
TrayIconOff=CapsLock_Off.png
# 托盘图标提示
TrayTipOn=大写键已锁🔒
TrayTipOff=大写键未锁🔓
# 音效配置
SoundMuted=true
KeySoundOn=KeyLock_On.wav
KeySoundOff=KeyLock_Off.wav
# HUD 显示时长 (<=0 Ignore)
HudDisplayDuration=1
# 自动恢复锁定状态 (LOCK|UNLOCK|NONE)
AutoRestoreState=UNLOCK
# 解除大写锁定延时 (<=0 Ignore)
AutoRestoreDelay=5

# 滚动锁定
[ScrollLock]
# 窗口坐标偏移
HudOffset=0,50
# 屏幕对齐方式
HudAlignment=HC|VT
# 桌面图像
HudImageOn=ScrollLock_On.png
HudImageOff=ScrollLock_Off.png
# 托盘图标
IconVisible=true
TrayIconOn=ScrollLock_On.png
TrayIconOff=ScrollLock_Off.png
# 托盘图标提示
TrayTipOn=滚动键已锁🔒
TrayTipOff=滚动键未锁🔓
# 音效配置
SoundMuted=true
KeySoundOn=KeyLock_On.wav
KeySoundOff=KeyLock_Off.wav
# HUD 显示时长 (<=0 Ignore)
HudDisplayDuration=1
# 自动恢复锁定状态 (LOCK|UNLOCK|NONE)
AutoRestoreState=UNLOCK
# 解除滚动锁定延时 (<=0 Ignore)
AutoRestoreDelay=5
