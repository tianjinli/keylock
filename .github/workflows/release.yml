name: Release Build

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        configuration: [Release]
        platform: [x64]
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
        # submodules: recursive

    - name: Add MSBuild to PATH
      uses: microsoft/setup-msbuild@v1.1
      with:
        vs-version: '16.0'

    - name: Build Release - ${{ matrix.platform }}
      run: |
        msbuild KeyLock.sln /p:Configuration=${{ matrix.configuration }} /p:Platform=${{ matrix.platform }} /v:normal
      working-directory: ${{ github.workspace }}

    - name: Upload Release Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: KeyLock-Release-${{ matrix.platform }}
        path: |
          Bin/Release/KeyLock.exe
        retention-days: 90

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Download Artifacts
      uses: actions/download-artifact@v4
      with:
        name: KeyLock-Release-x64
        path: ./artifacts

    - name: Rename Executable
      shell: bash
      run: |
        VERSION=${GITHUB_REF_NAME#v}
        mv ./artifacts/KeyLock.exe ./artifacts/KeyLock-$VERSION.exe
        echo "RELEASE_FILENAME=KeyLock-$VERSION.exe" >> $GITHUB_ENV

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          ./artifacts/${{ env.RELEASE_FILENAME }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
